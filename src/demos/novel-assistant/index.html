<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소설 작성 어시스턴트 · DevByHwang</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --ink: #1b1a17;
      --paper: #fffdf8;
      --line: #d9cfbf;
      --accent: #8a4f2a;
      --accent-soft: #f2e6db;
      --danger: #ad3e30;
      --ok: #2f6f46;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, #fbf6ed 0%, transparent 28%),
        radial-gradient(circle at 90% 100%, #efe2d2 0%, transparent 30%),
        var(--bg);
      font-family: "Iowan Old Style", "Times New Roman", serif;
    }

    .shell {
      width: min(1280px, calc(100% - 32px));
      margin: 24px auto;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 253, 248, 0.92);
      box-shadow: 0 14px 30px rgba(77, 54, 32, 0.08);
    }

    .head {
      margin-bottom: 18px;
      border-bottom: 1px dashed var(--line);
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.3vw, 35px);
      letter-spacing: 0.01em;
    }

    .sub {
      margin-top: 8px;
      color: #5b564d;
      font-size: 14px;
      line-height: 1.45;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 16px;
      min-height: 68vh;
      min-width: 0;
    }

    .pane {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .pane h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0.01em;
    }

    label {
      font-size: 12px;
      color: #6f6659;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 12px;
      line-height: 1.55;
      font-size: 15px;
      resize: vertical;
      font-family: "Iowan Old Style", "Times New Roman", serif;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .exercise-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .exercise-meta {
      font-size: 13px;
      color: #5b564d;
      line-height: 1.45;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--line);
    }

    .exercise-empty {
      margin: 0;
      color: #6f6659;
      font-size: 14px;
    }

    .exercise-field {
      display: grid;
      gap: 6px;
    }

    .exercise-field label {
      font-size: 11px;
    }

    .exercise-input {
      min-height: 88px;
      font-size: 14px;
      line-height: 1.5;
      font-family: inherit;
    }

    #manuscriptBody {
      min-height: 180px;
    }

    .roadmap-pane {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: #5b564d;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .tab.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      font-weight: 700;
    }

    .stage-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .stage-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      color: #5b564d;
      background: #fff;
    }

    .stage-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .roadmap-scroll {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 4px;
    }

    #roadmapSvg {
      display: block;
      width: 100%;
      min-width: 1600px;
      height: 180px;
    }

    .roadmap-hint {
      margin: 0;
      font-size: 12px;
      color: #6f6659;
    }

    .selected-card {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 7px;
      font-size: 13px;
      color: #4f493f;
    }

    .selected-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
    }

    .selected-row {
      margin: 0;
      line-height: 1.5;
    }

    .completion-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .completion-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #4f493f;
      border-radius: 8px;
      padding: 5px 9px;
      font-size: 12px;
      cursor: pointer;
    }

    .completion-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 700;
      background: var(--accent-soft);
    }

    .status {
      font-size: 13px;
      min-height: 20px;
      color: #5b564d;
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }

    .result {
      min-height: 180px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      overflow: auto;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .placeholder {
      color: #6f6659;
      font-size: 14px;
    }

    .result h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .score {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .card {
      border-top: 1px dashed var(--line);
      padding-top: 10px;
      margin-top: 10px;
    }

    .card:first-of-type {
      border-top: 0;
      margin-top: 0;
      padding-top: 0;
    }

    .card ul {
      margin: 6px 0 0;
      padding-left: 18px;
    }

    .owner-key-box {
      margin-top: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .owner-key-box input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
      min-width: 0;
    }

    .run {
      margin-top: auto;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .run:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .usage {
      margin-top: 6px;
      font-size: 12px;
      color: #5b564d;
    }

    .captcha-wrap {
      margin-top: 8px;
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #fff;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
    }

    #turnstileBox {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 65px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .shell {
        width: min(1240px, calc(100% - 16px));
        margin: 8px auto;
        padding: 12px;
      }
      .head {
        margin-bottom: 14px;
        padding-bottom: 12px;
      }
      h1 { font-size: clamp(21px, 7vw, 30px); }
      .pane { padding: 12px; }
      .pane { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="head">
      <h1>소설 작성 어시스턴트</h1>
      <p class="sub">
        Plot &amp; Structure-v2 흐름에 맞춘 단계형 연습 시스템입니다.
        로드맵 노드를 선택해 기초 LOCK부터 구조/막별 실행/수정까지 순차적으로 훈련하세요.
      </p>
    </header>

    <section class="layout">
      <article class="pane">
        <h2>연습 입력</h2>

        <div id="selectedDrillMeta" class="selected-card"></div>

        <label>연습 입력칸</label>
        <div id="exerciseFields" class="exercise-wrap">
          <p class="exercise-empty">로드맵에서 연습 항목을 선택하세요.</p>
        </div>

        <label for="manuscriptBody">원고 본문 (선택)</label>
        <textarea id="manuscriptBody" placeholder="문맥이 필요할 때만 원고 본문을 추가 입력하세요."></textarea>

        <label>피드백 결과</label>
        <div id="result" class="result">
          <p class="placeholder">아직 분석 결과가 없습니다.</p>
        </div>

        <p id="status" class="status"></p>
      </article>

      <aside class="pane">
        <h2>구조형 학습 로드맵</h2>

        <div class="roadmap-pane">
          <div id="stageLegend" class="stage-legend"></div>
          <div id="viewTabs" class="tabs"></div>
          <p class="roadmap-hint">원형 노드를 클릭해 연습 항목을 선택하세요. 번호는 추천 순서입니다.</p>
          <div class="roadmap-scroll">
            <svg id="roadmapSvg" viewBox="0 0 3400 180" preserveAspectRatio="none"></svg>
          </div>
        </div>

        <div id="completionControl" class="selected-card"></div>

        <button id="runBtn" class="run">분석 실행</button>
        <p class="usage">기본 무료 플랜: 하루 2회 (Owner 모드 제외)</p>
        <!-- TEST_ONLY_OWNER_BYPASS_START -->
        <div class="owner-key-box">
          <input id="ownerKeyInput" type="password" autocomplete="off" />
        </div>
        <!-- TEST_ONLY_OWNER_BYPASS_END -->
        <div class="captcha-wrap">
          <div id="turnstileBox"></div>
        </div>
      </aside>
    </section>
  </main>

    const viewTabs = [

    const selectedDrillMetaEl = document.getElementById("selectedDrillMeta");

    const ownerKeyInputEl = document.getElementById("ownerKeyInput");
    const OWNER_BYPASS_STORAGE_KEY = "novel-assistant-owner-key";
    const OWNER_BYPASS_HEADER = "X-Owner-Key";
    // TEST_ONLY_OWNER_BYPASS_END

    let turnstileToken = "";
    let turnstileWidgetId = null;
    let bodySaveTimer = null;
    let draftSaveTimer = null;

    const curriculumState = {
      lastSelectedDrillId: drills[0].id,
      activeTab: "all",
      perDrill: {},
    };

    function setRunButtonVisible(isVisible) {
      runBtnEl.style.display = isVisible ? "" : "none";
      runBtnEl.disabled = !isVisible;
    }

    // TEST_ONLY_OWNER_BYPASS_START
    function getOwnerKey() {
      if (!ownerKeyInputEl) return "";
      return ownerKeyInputEl.value.trim();
    }

    function hasOwnerKey() {
      return Boolean(getOwnerKey());
    }

    function refreshRunButtonVisibility() {
      setRunButtonVisible(Boolean(turnstileToken || hasOwnerKey()));
    }
    // TEST_ONLY_OWNER_BYPASS_END

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setStatus(message, type) {
      statusEl.textContent = message || "";
      statusEl.className = "status";
      if (type) statusEl.classList.add(type);
    }

    function getStageById(id) {
      return stages.find((stage) => stage.id === id) || null;
    }

    function getDrillById(id) {
      return drills.find((drill) => drill.id === id) || null;
    }

    function createEmptyProgress() {
      return {
        autoDone: false,
        lastScore: null,
        manualOverride: null,
        lastUpdatedAt: "",
      };
    }

    function ensureProgress(drillId) {
      if (!curriculumState.perDrill[drillId] || typeof curriculumState.perDrill[drillId] !== "object") {
        curriculumState.perDrill[drillId] = createEmptyProgress();
      }
      return curriculumState.perDrill[drillId];
    }

    function getEffectiveDone(progress) {
      if (progress.manualOverride === true) return true;
      if (progress.manualOverride === false) return false;
      return Boolean(progress.autoDone);
    }

    function getCompletionState(progress) {
      if (progress.manualOverride === true) return "manual_done";
      if (progress.manualOverride === false) return "manual_block";
      if (progress.autoDone) return "auto_done";
      return "pending";
    }

    function saveCurriculumState() {
      localStorage.setItem(
        CURRICULUM_STORAGE_KEY,
        JSON.stringify({
          lastSelectedDrillId: curriculumState.lastSelectedDrillId,
          activeTab: curriculumState.activeTab,
          perDrill: curriculumState.perDrill,
        })
      );
    }

    function loadCurriculumState() {
      try {
        const raw = localStorage.getItem(CURRICULUM_STORAGE_KEY) || "";
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return;

        if (typeof parsed.lastSelectedDrillId === "string" && getDrillById(parsed.lastSelectedDrillId)) {
          curriculumState.lastSelectedDrillId = parsed.lastSelectedDrillId;
        }
        if (typeof parsed.activeTab === "string" && viewTabs.some((tab) => tab.id === parsed.activeTab)) {
          curriculumState.activeTab = parsed.activeTab;
        }
        if (parsed.perDrill && typeof parsed.perDrill === "object") {
          curriculumState.perDrill = parsed.perDrill;
        }
      } catch {
        // ignore corrupted local storage
      }
    }

    function draftStorageKey(drillId) {
      return `${DRAFT_STORAGE_KEY_PREFIX}${drillId}:v2`;
    }

    function readDraft(drillId) {
      if (!drillId) return {};
      try {
        const raw = localStorage.getItem(draftStorageKey(drillId)) || "";
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function writeDraft(drillId, values) {
      if (!drillId) return;
      localStorage.setItem(draftStorageKey(drillId), JSON.stringify(values || {}));
    }

    function getSelectedDrill() {
      return getDrillById(curriculumState.lastSelectedDrillId) || drills[0];
    }

    function isDrillVisibleInTab(drill, tabId) {
      if (tabId === "all") return true;
      return drill.viewTags.includes(tabId);
    }

    function collectExerciseValues() {
      const values = {};
      exerciseFieldsEl.querySelectorAll("textarea[data-field-key]").forEach((el) => {
        values[el.dataset.fieldKey] = el.value || "";
      });
      return values;
    }

    function persistCurrentDraft() {
      const selected = getSelectedDrill();
      if (!selected) return;
      writeDraft(selected.id, collectExerciseValues());
    }

    function selectDrill(drillId) {
      if (!getDrillById(drillId)) return;
      persistCurrentDraft();
      curriculumState.lastSelectedDrillId = drillId;
      saveCurriculumState();
      renderAll();
    }

    function setActiveTab(tabId) {
      if (!viewTabs.some((tab) => tab.id === tabId)) return;
      curriculumState.activeTab = tabId;
      saveCurriculumState();
      renderRoadmap();
      renderTabs();
    }

    function setManualOverride(mode) {
      const selected = getSelectedDrill();
      const progress = ensureProgress(selected.id);
      if (mode === "manual_done") {
        progress.manualOverride = true;
      } else if (mode === "manual_block") {
        progress.manualOverride = false;
      } else {
        progress.manualOverride = null;
      }
      progress.lastUpdatedAt = new Date().toISOString();
      saveCurriculumState();
      renderRoadmap();
      renderCompletionControl();
      renderSelectedMeta();
    }

    function renderStageLegend() {
      stageLegendEl.innerHTML = "";
      stages.forEach((stage) => {
        const chip = document.createElement("span");
        chip.className = "stage-chip";
        chip.innerHTML = `<span class="stage-dot" style="background:${stage.color}"></span>${escapeHtml(stage.label)}`;
        stageLegendEl.appendChild(chip);
      });
    }

    function renderTabs() {
      viewTabsEl.innerHTML = "";
      viewTabs.forEach((tab) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tab${curriculumState.activeTab === tab.id ? " active" : ""}`;
        button.textContent = tab.label;
        button.addEventListener("click", () => {
          setActiveTab(tab.id);
        });
        viewTabsEl.appendChild(button);
      });
    }

    function renderRoadmap() {
      const NS = "http://www.w3.org/2000/svg";
      roadmapSvgEl.innerHTML = "";

      const sorted = [...drills].sort((a, b) => a.roadmapOrder - b.roadmapOrder);
      const startX = 80;
      const step = 135;
      const y = 74;
      const points = sorted.map((_, idx) => `${startX + idx * step},${y}`).join(" ");

      const polyline = document.createElementNS(NS, "polyline");
      polyline.setAttribute("points", points);
      polyline.setAttribute("fill", "none");
      polyline.setAttribute("stroke", "#bdaf9b");
      polyline.setAttribute("stroke-width", "4");
      roadmapSvgEl.appendChild(polyline);

      sorted.forEach((drill, idx) => {
        const stage = getStageById(drill.stageId);
        const progress = ensureProgress(drill.id);
        const completion = getCompletionState(progress);
        const visible = isDrillVisibleInTab(drill, curriculumState.activeTab);
        const selected = curriculumState.lastSelectedDrillId === drill.id;
        const cx = startX + idx * step;

        const group = document.createElementNS(NS, "g");
        group.setAttribute("transform", `translate(${cx}, ${y})`);
        group.style.cursor = "pointer";
        group.style.opacity = visible ? "1" : "0.3";

        const circle = document.createElementNS(NS, "circle");
        circle.setAttribute("r", selected ? "22" : "18");
        circle.setAttribute("stroke", stage ? stage.color : "#888");
        circle.setAttribute("stroke-width", selected ? "4" : "2");

        if (completion === "manual_done") {
          circle.setAttribute("fill", stage ? stage.color : "#8a4f2a");
          circle.setAttribute("stroke-width", selected ? "5" : "4");
        } else if (completion === "auto_done") {
          circle.setAttribute("fill", stage ? `${stage.color}55` : "#d9cfbf");
        } else if (completion === "manual_block") {
          circle.setAttribute("fill", "#f8d7d1");
          circle.setAttribute("stroke", "#ad3e30");
        } else {
          circle.setAttribute("fill", "#fff");
        }
        group.appendChild(circle);

        const text = document.createElementNS(NS, "text");
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("dy", "4");
        text.setAttribute("font-size", "11");
        text.setAttribute("font-weight", "700");
        text.setAttribute("fill", completion === "manual_done" ? "#fff" : "#2e2a24");
        text.textContent = String(drill.roadmapOrder);
        group.appendChild(text);

        if (completion === "auto_done" || completion === "manual_done") {
          const check = document.createElementNS(NS, "text");
          check.setAttribute("text-anchor", "middle");
          check.setAttribute("x", "13");
          check.setAttribute("y", "-11");
          check.setAttribute("font-size", "10");
          check.setAttribute("font-weight", "700");
          check.setAttribute("fill", completion === "manual_done" ? "#fff" : "#2f6f46");
          check.textContent = "✓";
          group.appendChild(check);
        }

        const label = document.createElementNS(NS, "text");
        label.setAttribute("text-anchor", "middle");
        label.setAttribute("y", "34");
        label.setAttribute("font-size", "9");
        label.setAttribute("fill", "#4f493f");
        label.textContent = drill.shortLabel;
        group.appendChild(label);

        group.addEventListener("click", () => selectDrill(drill.id));
        roadmapSvgEl.appendChild(group);
      });
    }

    function renderSelectedMeta() {
      const selected = getSelectedDrill();
      const stage = getStageById(selected.stageId);
      const progress = ensureProgress(selected.id);
      const completion = getCompletionState(progress);

      let completionText = "미완료";
      if (completion === "auto_done") completionText = `자동 완료 (최근 점수 ${Number(progress.lastScore).toFixed(1)})`;
      if (completion === "manual_done") completionText = "수동 완료";
      if (completion === "manual_block") completionText = "수동 해제";

      selectedDrillMetaEl.innerHTML = `
        <div class="selected-title">${escapeHtml(selected.title)}</div>
        <p class="selected-row"><strong>Stage:</strong> ${escapeHtml(stage ? stage.label : "-")}</p>
        <p class="selected-row"><strong>목표:</strong> ${escapeHtml(selected.goal)}</p>
        <p class="selected-row"><strong>통과 기준:</strong> ${escapeHtml(selected.passRule)}</p>
        <p class="selected-row"><strong>권장 반복 포인트:</strong> ${escapeHtml(selected.repetitionTip)}</p>
        <p class="selected-row"><strong>참고:</strong> ${escapeHtml(selected.bookRefs)}</p>
        <p class="selected-row"><strong>완료 상태:</strong> ${escapeHtml(completionText)}</p>
      `;
    }

    function renderCompletionControl() {
      const selected = getSelectedDrill();
      const progress = ensureProgress(selected.id);
      const manual = progress.manualOverride;

      completionControlEl.innerHTML = `
        <div class="selected-title">완료 상태 조정</div>
        <p class="selected-row">자동 완료 기준: 점수 ${AUTO_DONE_THRESHOLD.toFixed(1)} 이상</p>
        <div class="completion-row">
          <button type="button" id="btnManualDone" class="completion-btn${manual === true ? " active" : ""}">수동 완료</button>
          <button type="button" id="btnManualBlock" class="completion-btn${manual === false ? " active" : ""}">수동 해제</button>
          <button type="button" id="btnManualAuto" class="completion-btn${manual === null ? " active" : ""}">자동 따르기</button>
        </div>
      `;

      document.getElementById("btnManualDone").addEventListener("click", () => setManualOverride("manual_done"));
      document.getElementById("btnManualBlock").addEventListener("click", () => setManualOverride("manual_block"));
      document.getElementById("btnManualAuto").addEventListener("click", () => setManualOverride("auto"));
    }

    function renderExerciseFields() {
      const selected = getSelectedDrill();
      const draft = readDraft(selected.id);
      exerciseFieldsEl.innerHTML = "";

      if (!selected) {
        exerciseFieldsEl.innerHTML = "<p class=\"exercise-empty\">로드맵에서 연습 항목을 선택하세요.</p>";
        return;
      }

      selected.templateFields.forEach((field) => {
        const wrap = document.createElement("div");
        wrap.className = "exercise-field";
        wrap.innerHTML = `
          <label for="field_${field.key}">${escapeHtml(field.label)}</label>
          <textarea
            id="field_${field.key}"
            class="exercise-input"
            data-field-key="${escapeHtml(field.key)}"
            placeholder="${escapeHtml(field.placeholder || field.label)}"
          >${escapeHtml(draft[field.key] || "")}</textarea>
        `;

        const input = wrap.querySelector("textarea");
        input.addEventListener("input", () => {
          if (draftSaveTimer) clearTimeout(draftSaveTimer);
          draftSaveTimer = setTimeout(() => {
            writeDraft(selected.id, collectExerciseValues());
          }, 200);
        });

        exerciseFieldsEl.appendChild(wrap);
      });
    }

    function buildPresetForRequest(selected) {
      const stage = getStageById(selected.stageId);
      return [
        "당신은 한국어 소설 편집자입니다.",
        "출력 형식: 점수(10점), 근거, 수정안을 간결하게 제시하세요.",
        "각 수정안의 마지막 줄은 반드시 `다음 반복 과제 1개: ...` 형식으로 작성하세요.",
        `학습 단계: [${stage ? stage.label : selected.stageId}]`,
        `선택 연습: ${selected.title} (${selected.id})`,
        `목표: ${selected.goal}`,
        `통과 기준: ${selected.passRule}`,
        `권장 반복 포인트: ${selected.repetitionTip}`,
      ].join("\n");
    }

    function buildStructuredExerciseText(selected, values) {
      const stage = getStageById(selected.stageId);
      const lines = [];
      lines.push(PRESET_START);
      lines.push("[점검 프리셋]");
      lines.push("");
      lines.push(`[${stage ? stage.label : selected.stageId} | ${selected.title}]`);
      lines.push(`ID: ${selected.id}`);
      lines.push(`목표: ${selected.goal}`);
      lines.push(`통과 기준: ${selected.passRule}`);
      lines.push(`권장 반복 포인트: ${selected.repetitionTip}`);
      lines.push(`참고: ${selected.bookRefs}`);

      selected.templateFields.forEach((field) => {
        lines.push("");
        lines.push(`${field.label}:`);
        lines.push((values[field.key] || "").trim());
      });

      lines.push("");
      lines.push("---");
      lines.push("[원고 본문]");
      lines.push(PRESET_END);
      return lines.join("\n");
    }

    function buildManuscriptPayload(exerciseText, optionalBody) {
      if (!optionalBody) return exerciseText.trim();
      return `${exerciseText}\n\n${optionalBody}`.trim();
    }

    function validateExerciseInput(selected, values) {
      return selected.templateFields.every((field) => String(values[field.key] || "").trim());
    }

    function tryRenderTurnstile() {
      if (turnstileWidgetId !== null) return;
      if (!window.turnstile) return;

      if (!TURNSTILE_SITE_KEY || TURNSTILE_SITE_KEY.startsWith("YOUR_")) {
        setStatus("Turnstile 사이트키가 설정되지 않았습니다.", "error");
        runBtnEl.disabled = true;
        return;
      }

      turnstileWidgetId = window.turnstile.render(turnstileBoxEl, {
        sitekey: TURNSTILE_SITE_KEY,
        size: "flexible",
        action: TURNSTILE_ACTION,
        callback(token) {
          turnstileToken = token || "";
          refreshRunButtonVisibility();
        },
        "expired-callback"() {
          turnstileToken = "";
          refreshRunButtonVisibility();
        },
        "error-callback"() {
          turnstileToken = "";
          refreshRunButtonVisibility();
          setStatus("보안 검증 위젯 오류가 발생했습니다. 잠시 후 다시 시도하세요.", "error");
        },
      });
    }

    function renderResult(payload) {
      const parts = [];

      if (typeof payload.overallScore === "number") {
        parts.push(`<div class="score">종합 점수 ${payload.overallScore.toFixed(1)} / 10</div>`);
      }

      if (payload.summary) {
        parts.push(`<h3>요약</h3><p>${escapeHtml(payload.summary)}</p>`);
      }

      if (Array.isArray(payload.items) && payload.items.length > 0) {
        payload.items.forEach((item) => {
          const evidence = Array.isArray(item.evidence)
            ? `<ul>${item.evidence.map((line) => `<li>${escapeHtml(line)}</li>`).join("")}</ul>`
            : "";

          parts.push(`
            <section class="card">
              <h3>${escapeHtml(item.label || item.id || "점검")}</h3>
              ${typeof item.score === "number" ? `<p><strong>점수:</strong> ${item.score} / 10</p>` : ""}
              ${evidence}
              ${item.suggestion ? `<p><strong>수정안:</strong> ${escapeHtml(item.suggestion)}</p>` : ""}
            </section>
          `);
        });
      }

      if (payload.usage && typeof payload.usage.remainingToday === "number") {
        parts.push(
          `<section class="card"><p><strong>남은 횟수:</strong> ${payload.usage.remainingToday} / ${payload.usage.limitPerDay}</p></section>`
        );
      }

      resultEl.innerHTML = parts.length > 0
        ? parts.join("")
        : "<p class=\"placeholder\">응답을 해석하지 못했습니다.</p>";
    }

    function applyAutoCompletionFromResponse(selectedDrillId, payload) {
      if (!payload || !Array.isArray(payload.items)) return;
      const matched = payload.items.find((item) => item && item.id === selectedDrillId) || payload.items[0];
      if (!matched || typeof matched.score !== "number") return;

      const progress = ensureProgress(selectedDrillId);
      progress.lastScore = Number(matched.score);
      progress.autoDone = Number(matched.score) >= AUTO_DONE_THRESHOLD;
      progress.lastUpdatedAt = new Date().toISOString();
      saveCurriculumState();

      renderRoadmap();
      renderSelectedMeta();
      renderCompletionControl();
    }

    async function runAnalysis() {
      const selected = getSelectedDrill();
      if (!selected) {
        setStatus("로드맵에서 연습 항목을 선택하세요.", "error");
        return;
      }

      const values = collectExerciseValues();
      if (!validateExerciseInput(selected, values)) {
        setStatus("연습 입력칸을 먼저 채워주세요.", "error");
        return;
      }
      writeDraft(selected.id, values);

      const optionalBody = manuscriptBodyEl.value.trim();
      const exerciseText = buildStructuredExerciseText(selected, values);
      const manuscript = buildManuscriptPayload(exerciseText, optionalBody);

      if (!turnstileToken && !hasOwnerKey()) {
        setStatus("보안 검증을 완료한 뒤 다시 시도하세요.", "error");
        return;
      }

      const payload = {
        manuscript,
        preset: buildPresetForRequest(selected),
        checks: [selected.id],
        turnstileToken,
        meta: {
          lang: "ko",
          version: "v2",
          curriculumStage: selected.stageId,
        },
      };

      setStatus("분석 요청 중...", null);
      runBtnEl.disabled = true;

      try {
        const headers = {
          "Content-Type": "application/json",
        };

        const ownerKey = getOwnerKey();
        if (ownerKey) {
          headers[OWNER_BYPASS_HEADER] = ownerKey;
        }

        const response = await fetch(API_ENDPOINT, {
          method: "POST",
          headers,
          body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (!response.ok) {
          const code = data?.error?.code;
          let message = data?.error?.message || "요청 처리 중 오류가 발생했습니다.";

          if (code === "INVALID_CAPTCHA") {
            message = "보안 검증이 만료되었거나 유효하지 않습니다. 다시 검증해 주세요.";
            turnstileToken = "";
            if (window.turnstile && turnstileWidgetId !== null) {
              window.turnstile.reset(turnstileWidgetId);
            }
            refreshRunButtonVisibility();
          } else if (code === "PAYLOAD_TOO_LARGE") {
            message = "원고는 최대 12,000자까지 입력할 수 있습니다.";
          }

          throw new Error(message);
        }

        renderResult(data);
        applyAutoCompletionFromResponse(selected.id, data);

        turnstileToken = "";
        if (window.turnstile && turnstileWidgetId !== null) {
          window.turnstile.reset(turnstileWidgetId);
        }
        refreshRunButtonVisibility();
        setStatus("분석이 완료되었습니다.", "ok");
      } catch (err) {
        setStatus(err.message || "네트워크 오류가 발생했습니다.", "error");
      } finally {
        refreshRunButtonVisibility();
      }
    }

    function renderAll() {
      renderTabs();
      renderRoadmap();
      renderSelectedMeta();
      renderCompletionControl();
      renderExerciseFields();
    }

    function initBodyDraft() {
      const savedBody = localStorage.getItem(BODY_STORAGE_KEY) || "";
      if (savedBody) manuscriptBodyEl.value = savedBody;

      manuscriptBodyEl.addEventListener("input", () => {
        if (bodySaveTimer) clearTimeout(bodySaveTimer);
        bodySaveTimer = setTimeout(() => {
          localStorage.setItem(BODY_STORAGE_KEY, manuscriptBodyEl.value || "");
        }, 200);
      });
    }

    loadCurriculumState();
    renderStageLegend();
    initBodyDraft();

    runBtnEl.addEventListener("click", runAnalysis);

    // TEST_ONLY_OWNER_BYPASS_START
    if (ownerKeyInputEl) {
      const savedOwnerKey = localStorage.getItem(OWNER_BYPASS_STORAGE_KEY) || "";
      if (savedOwnerKey) ownerKeyInputEl.value = savedOwnerKey;

      ownerKeyInputEl.addEventListener("input", () => {
        const value = getOwnerKey();
        if (value) {
          localStorage.setItem(OWNER_BYPASS_STORAGE_KEY, value);
        } else {
          localStorage.removeItem(OWNER_BYPASS_STORAGE_KEY);
        }
        refreshRunButtonVisibility();
      });
    }
    // TEST_ONLY_OWNER_BYPASS_END

    renderAll();
    refreshRunButtonVisibility();

    const turnstileInitTimer = setInterval(() => {
      tryRenderTurnstile();
      if (turnstileWidgetId !== null || !TURNSTILE_SITE_KEY || TURNSTILE_SITE_KEY.startsWith("YOUR_")) {
        clearInterval(turnstileInitTimer);
      }
    }, 200);
  </script>
  <script
    src="../../assets/visitor-counter.js"
    defer
    data-visitor-counter
    data-namespace="devbyhwang-tel-aviv"
    data-total-key="total"
    data-daily-prefix="daily"
    data-timezone="Asia/Seoul"
  ></script>
  <div
    data-visitor-counter
    data-namespace="devbyhwang-tel-aviv-playground"
    data-total-key="total"
    data-daily-prefix="daily"
    data-timezone="Asia/Seoul"
    data-today-id=""
    data-total-id=""
    hidden
  ></div>
</body>
</html>
