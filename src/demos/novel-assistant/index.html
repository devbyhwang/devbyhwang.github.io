<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소설 작성 어시스턴트 · DevByHwang</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --ink: #1b1a17;
      --paper: #fffdf8;
      --line: #d9cfbf;
      --accent: #8a4f2a;
      --accent-soft: #f2e6db;
      --danger: #ad3e30;
      --ok: #2f6f46;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, #fbf6ed 0%, transparent 28%),
        radial-gradient(circle at 90% 100%, #efe2d2 0%, transparent 30%),
        var(--bg);
      font-family: "Iowan Old Style", "Times New Roman", serif;
    }

    .shell {
      width: min(1240px, calc(100% - 32px));
      margin: 24px auto;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 253, 248, 0.92);
      box-shadow: 0 14px 30px rgba(77, 54, 32, 0.08);
    }

    .head {
      margin-bottom: 18px;
      border-bottom: 1px dashed var(--line);
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3.3vw, 35px);
      letter-spacing: 0.01em;
    }

    .sub {
      margin-top: 8px;
      color: #5b564d;
      font-size: 14px;
      line-height: 1.45;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.45fr 1fr;
      gap: 16px;
      min-height: 66vh;
      min-width: 0;
    }

    .pane {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .pane h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0.01em;
    }

    label {
      font-size: 12px;
      color: #6f6659;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 12px;
      line-height: 1.55;
      font-size: 15px;
      resize: vertical;
      min-height: 280px;
      font-family: "Iowan Old Style", "Times New Roman", serif;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .status {
      font-size: 13px;
      min-height: 20px;
      color: #5b564d;
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }

    .result {
      min-height: 180px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      overflow: auto;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .placeholder {
      color: #6f6659;
      font-size: 14px;
    }

    .result h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .score {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .card {
      border-top: 1px dashed var(--line);
      padding-top: 10px;
      margin-top: 10px;
    }

    .card:first-of-type {
      border-top: 0;
      margin-top: 0;
      padding-top: 0;
    }

    .card ul {
      margin: 6px 0 0;
      padding-left: 18px;
    }

    .controls {
      display: grid;
      gap: 8px;
      margin-top: 4px;
      --checklist-max-height: 440px;
      max-height: var(--checklist-max-height);
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-gutter: stable;
      min-width: 0;
    }

    .check {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 10px;
      align-items: start;
      min-width: 0;
    }

    .check input { margin-top: 2px; }

    .check-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .check-desc {
      font-size: 12px;
      color: #5b564d;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .owner-key-box {
      margin-top: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .owner-key-box input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
      min-width: 0;
    }

    .run {
      margin-top: auto;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .run:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .usage {
      margin-top: 6px;
      font-size: 12px;
      color: #5b564d;
    }

    .captcha-wrap {
      margin-top: 8px;
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #fff;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
    }

    #turnstileBox {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 65px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .shell {
        width: min(1240px, calc(100% - 16px));
        margin: 8px auto;
        padding: 12px;
      }
      .head {
        margin-bottom: 14px;
        padding-bottom: 12px;
      }
      h1 { font-size: clamp(21px, 7vw, 30px); }
      .pane { padding: 12px; }
      .pane { min-height: auto; }
      .controls {
        max-height: min(var(--checklist-max-height), 380px);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="head">
      <h1>소설 작성 어시스턴트</h1>
      <p class="sub">원고를 입력하고 점검 항목을 선택해 분석하세요.</p>
    </header>

    <section class="layout">
      <article class="pane">
        <h2>원고 입력</h2>
        <label for="manuscript">초안 텍스트</label>
        <textarea id="manuscript" placeholder="분석할 소설 원고를 입력하세요."></textarea>

        <label>피드백 결과</label>
        <div id="result" class="result">
          <p class="placeholder">아직 분석 결과가 없습니다.</p>
        </div>

        <p id="status" class="status"></p>
      </article>

      <aside class="pane">
        <h2>점검 항목 선택</h2>
        <div id="checkList" class="controls"></div>
        <button id="runBtn" class="run">분석 실행</button>
        <p class="usage">기본 무료 플랜: 하루 2회</p>
        <!-- TEST_ONLY_OWNER_BYPASS_START -->
        <div class="owner-key-box">
          <input id="ownerKeyInput" type="password" autocomplete="off" />
        </div>
        <!-- TEST_ONLY_OWNER_BYPASS_END -->
        <div class="captcha-wrap">
          <div id="turnstileBox"></div>
        </div>
      </aside>
    </section>
  </main>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>

          "최우선 문제 1개:",
          "원인 진단:",
          "처방(구체 수정 행동 3개):",
          "24시간 내 적용 가능한 수정 1개:",
          "재발 방지 규칙 1개:",
        ].join("\n"),
        checked: false,
      },
      {
        id: "ch14_toolbox",
        label: "도구 상자",
        description: "Show/Tell 교정과 개인 도구화를 점검합니다.",
        chapter: "Chapter 14",
        goal: "문장/장면 개선 도구를 추출해 재사용 가능한 규칙으로 만든다.",
        passRule: "교정 결과가 분명하고 개인 툴셋으로 정리된다.",
        recommendedOrder: 14,
        template: [
          "Show→Tell 교정 대상 문장 5개:",
          "각 문장의 개선 버전:",
          "이번 작품에서 쓸 개인 도구 5개:",
          "도구별 사용 트리거:",
          "남용 위험 도구 1개와 제한 규칙:",
          "다음 원고에 이식할 규칙 1개:",
        ].join("\n"),
        checked: false,
      },
      {
        id: "appendix_critical_points",
        label: "부록A 핵심 체크",
        description: "핵심 결손 요소를 체크리스트로 점검합니다.",
        chapter: "Appendix A",
        goal: "치명 결손을 빠르게 탐지하고 보완 우선순위를 정한다.",
        passRule: "LOCK/몰입/대립 기준의 누락 항목과 보완 액션이 제시된다.",
        recommendedOrder: 15,
        template: [
          "LOCK 점검표(Lead/Objective/Confrontation/Knockout):",
          "독자 몰입 저해 요소 3개:",
          "반대세력 강도 점검:",
          "핵심 질문 회수 여부:",
          "치명 누락 1개와 보완 액션:",
          "전체 완성도 자체 점수(10점):",
        ].join("\n"),
        checked: false,
      },
      {
        id: "appendix_backcover_copy",
        label: "부록B 백커버 카피",
        description: "스토리 질문 중심 백커버 카피를 점검합니다.",
        chapter: "Appendix B",
        goal: "작품의 후킹 포인트를 한 페이지 카피로 압축한다.",
        passRule: "리드/갈등/질문/톤이 짧은 카피에 모두 반영된다.",
        recommendedOrder: 16,
        template: [
          "리드 캐릭터 이름/직업:",
          "돌아올 수 없는 문턱 사건:",
          "주요 반대세력:",
          "스토리 질문 1문장:",
          "분위기 키워드 3개:",
          "백커버 카피 초안(5~7문장):",
        ].join("\n"),
        checked: false,
      },
    ];

    const manuscriptEl = document.getElementById("manuscript");
    const checkListEl = document.getElementById("checkList");
    const runBtnEl = document.getElementById("runBtn");
    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");
    const turnstileBoxEl = document.getElementById("turnstileBox");
    // TEST_ONLY_OWNER_BYPASS_START
    const ownerKeyInputEl = document.getElementById("ownerKeyInput");
    const OWNER_BYPASS_STORAGE_KEY = "novel-assistant-owner-key";
    const OWNER_BYPASS_HEADER = "X-Owner-Key";
    // TEST_ONLY_OWNER_BYPASS_END

    let turnstileToken = "";
    let turnstileWidgetId = null;

    function setRunButtonVisible(isVisible) {
      runBtnEl.style.display = isVisible ? "" : "none";
      runBtnEl.disabled = !isVisible;
    }

    // TEST_ONLY_OWNER_BYPASS_START
    function getOwnerKey() {
      if (!ownerKeyInputEl) return "";
      return ownerKeyInputEl.value.trim();
    }

    function hasOwnerKey() {
      return Boolean(getOwnerKey());
    }

    function refreshRunButtonVisibility() {
      setRunButtonVisible(Boolean(turnstileToken || hasOwnerKey()));
    }
    // TEST_ONLY_OWNER_BYPASS_END

    function selectedChecks() {
      return checks
        .filter((item) => item.checked)
        .sort((a, b) => a.recommendedOrder - b.recommendedOrder);
    }

    function composePresetText(items) {
      const lines = [];
      lines.push(PRESET_START);
      lines.push("[점검 프리셋]");

      if (items.length === 0) {
        lines.push("- 점검 항목을 선택하세요.");
      } else {
        items.forEach((item) => {
          lines.push("");
          lines.push(`[${item.label}]`);
          lines.push(`목표: ${item.goal}`);
          lines.push(`통과 기준: ${item.passRule}`);
          lines.push(item.template);
        });
      }

      lines.push("");
      lines.push("---");
      lines.push("[원고 본문]");
      lines.push(PRESET_END);
      return lines.join("\n");
    }

    function splitPresetAndBody(text) {
      const startIdx = text.indexOf(PRESET_START);
      const endIdx = text.indexOf(PRESET_END);

      if (startIdx === -1 || endIdx === -1 || endIdx < startIdx) {
        return { preset: "", body: text.trim() };
      }

      const body = text.slice(endIdx + PRESET_END.length).trimStart();
      const preset = text.slice(startIdx, endIdx + PRESET_END.length);
      return { preset, body };
    }

    function extractUserBody(text) {
      return splitPresetAndBody(text).body.trim();
    }

    function mergePresetIntoTextarea() {
      const { body } = splitPresetAndBody(manuscriptEl.value);
      const presetText = composePresetText(selectedChecks());
      manuscriptEl.value = `${presetText}\n\n${body}`.trimEnd();
    }

    function buildPresetForRequest() {
      const picked = selectedChecks();
      const lines = [
        "당신은 한국어 소설 편집자입니다.",
        "출력 형식: 점수(10점), 근거, 수정안을 간결하게 제시하세요.",
        "각 수정안의 마지막 줄은 반드시 `다음 반복 과제 1개: ...` 형식으로 작성하세요.",
      ];

      if (picked.length > 0) {
        lines.push("점검 항목(목표/통과 기준):");
        picked.forEach((item, idx) => {
          lines.push(`${idx + 1}. ${item.label}`);
          lines.push(`목표: ${item.goal}`);
          lines.push(`통과 기준: ${item.passRule}`);
        });
      }

      return lines.join("\n");
    }

    function applyChecklistMaxHeight() {
      const firstCheck = checkListEl.querySelector(".check");
      if (!firstCheck) {
        checkListEl.style.setProperty("--checklist-max-height", `${CHECKLIST_HEIGHT_FALLBACK}px`);
        return;
      }

      const checkListStyle = window.getComputedStyle(checkListEl);
      const gap = Number.parseFloat(checkListStyle.rowGap || checkListStyle.gap || "0");
      const itemHeight = firstCheck.getBoundingClientRect().height;

      if (!Number.isFinite(itemHeight) || itemHeight <= 0) {
        checkListEl.style.setProperty("--checklist-max-height", `${CHECKLIST_HEIGHT_FALLBACK}px`);
        return;
      }

      const safeGap = Number.isFinite(gap) ? gap : 0;
      const totalHeight =
        itemHeight * CHECKLIST_VISIBLE_COUNT + safeGap * Math.max(0, CHECKLIST_VISIBLE_COUNT - 1);

      checkListEl.style.setProperty("--checklist-max-height", `${Math.round(totalHeight)}px`);
    }

    function renderChecks() {
      checkListEl.innerHTML = "";
      [...checks]
        .sort((a, b) => a.recommendedOrder - b.recommendedOrder)
        .forEach((item) => {
          const wrap = document.createElement("label");
          wrap.className = "check";
          wrap.innerHTML = `
            <input type="checkbox" ${item.checked ? "checked" : ""} />
            <span>
              <span class="check-title">${item.label}</span>
              <span class="check-desc">${item.description}</span>
            </span>
          `;

          const input = wrap.querySelector("input");
          input.addEventListener("change", (e) => {
            if (e.target.checked && selectedChecks().length >= MAX_SELECTED_CHECKS) {
              e.target.checked = false;
              setStatus(`점검 항목은 최대 ${MAX_SELECTED_CHECKS}개까지 선택할 수 있습니다.`, "error");
              return;
            }

            item.checked = e.target.checked;
            if (statusEl.textContent.includes("최대") && statusEl.classList.contains("error")) {
              setStatus("", null);
            }
            mergePresetIntoTextarea();
          });

          checkListEl.appendChild(wrap);
        });

      requestAnimationFrame(applyChecklistMaxHeight);
    }

    function setStatus(message, type) {
      statusEl.textContent = message || "";
      statusEl.className = "status";
      if (type) statusEl.classList.add(type);
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function tryRenderTurnstile() {
      if (turnstileWidgetId !== null) return;
      if (!window.turnstile) return;

      if (!TURNSTILE_SITE_KEY || TURNSTILE_SITE_KEY.startsWith("YOUR_")) {
        setStatus("Turnstile 사이트키가 설정되지 않았습니다.", "error");
        runBtnEl.disabled = true;
        return;
      }

      turnstileWidgetId = window.turnstile.render(turnstileBoxEl, {
        sitekey: TURNSTILE_SITE_KEY,
        size: "flexible",
        action: TURNSTILE_ACTION,
        callback(token) {
          turnstileToken = token || "";
          refreshRunButtonVisibility();
        },
        "expired-callback"() {
          turnstileToken = "";
          refreshRunButtonVisibility();
        },
        "error-callback"() {
          turnstileToken = "";
          refreshRunButtonVisibility();
          setStatus("보안 검증 위젯 오류가 발생했습니다. 잠시 후 다시 시도하세요.", "error");
        },
      });
    }

    function renderResult(payload) {
      const parts = [];

      if (typeof payload.overallScore === "number") {
        parts.push(`<div class="score">종합 점수 ${payload.overallScore.toFixed(1)} / 10</div>`);
      }

      if (payload.summary) {
        parts.push(`<h3>요약</h3><p>${escapeHtml(payload.summary)}</p>`);
      }

      if (Array.isArray(payload.items) && payload.items.length > 0) {
        payload.items.forEach((item) => {
          const evidence = Array.isArray(item.evidence)
            ? `<ul>${item.evidence.map((line) => `<li>${escapeHtml(line)}</li>`).join("")}</ul>`
            : "";

          parts.push(`
            <section class="card">
              <h3>${escapeHtml(item.label || item.id || "점검")}</h3>
              ${typeof item.score === "number" ? `<p><strong>점수:</strong> ${item.score} / 10</p>` : ""}
              ${evidence}
              ${item.suggestion ? `<p><strong>수정안:</strong> ${escapeHtml(item.suggestion)}</p>` : ""}
            </section>
          `);
        });
      }

      if (payload.usage && typeof payload.usage.remainingToday === "number") {
        parts.push(
          `<section class="card"><p><strong>남은 횟수:</strong> ${payload.usage.remainingToday} / ${payload.usage.limitPerDay}</p></section>`
        );
      }

      resultEl.innerHTML = parts.length > 0
        ? parts.join("")
        : "<p class=\"placeholder\">응답을 해석하지 못했습니다.</p>";
    }

    async function runAnalysis() {
      const manuscript = manuscriptEl.value.trim();
      if (!manuscript) {
        setStatus("원고 텍스트를 먼저 입력하세요.", "error");
        manuscriptEl.focus();
        return;
      }

      const userBody = extractUserBody(manuscript);
      if (!userBody) {
        setStatus("프리셋 항목 또는 원고 본문을 입력하세요.", "error");
        manuscriptEl.focus();
        return;
      }

      const selected = selectedChecks();
      if (selected.length === 0) {
        setStatus("점검 항목을 1개 이상 선택하세요.", "error");
        return;
      }
      if (selected.length > MAX_SELECTED_CHECKS) {
        setStatus(`점검 항목은 최대 ${MAX_SELECTED_CHECKS}개까지 선택할 수 있습니다.`, "error");
        return;
      }

      if (!turnstileToken && !hasOwnerKey()) {
        setStatus("보안 검증을 완료한 뒤 다시 시도하세요.", "error");
        return;
      }

      const payload = {
        manuscript,
        preset: buildPresetForRequest(),
        checks: selected.map((x) => x.id),
        turnstileToken,
        meta: {
          lang: "ko",
          version: "v1",
        },
      };

      setStatus("분석 요청 중...", null);
      runBtnEl.disabled = true;

      try {
        const headers = {
          "Content-Type": "application/json",
        };
        const ownerKey = getOwnerKey();
        if (ownerKey) {
          headers[OWNER_BYPASS_HEADER] = ownerKey;
        }

        const response = await fetch(API_ENDPOINT, {
          method: "POST",
          headers,
          body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (!response.ok) {
          const code = data?.error?.code;
          let message = data?.error?.message || "요청 처리 중 오류가 발생했습니다.";

          if (code === "INVALID_CAPTCHA") {
            message = "보안 검증이 만료되었거나 유효하지 않습니다. 다시 검증해 주세요.";
            turnstileToken = "";
            if (window.turnstile && turnstileWidgetId !== null) {
              window.turnstile.reset(turnstileWidgetId);
            }
            refreshRunButtonVisibility();
          } else if (code === "PAYLOAD_TOO_LARGE") {
            message = "원고는 최대 12,000자까지 입력할 수 있습니다.";
          }

          throw new Error(message);
        }

        renderResult(data);
        turnstileToken = "";
        if (window.turnstile && turnstileWidgetId !== null) {
          window.turnstile.reset(turnstileWidgetId);
        }
        refreshRunButtonVisibility();
        setStatus("분석이 완료되었습니다.", "ok");
      } catch (err) {
        setStatus(err.message || "네트워크 오류가 발생했습니다.", "error");
      } finally {
        refreshRunButtonVisibility();
      }
    }

    runBtnEl.addEventListener("click", runAnalysis);
    // TEST_ONLY_OWNER_BYPASS_START
    if (ownerKeyInputEl) {
      const savedOwnerKey = localStorage.getItem(OWNER_BYPASS_STORAGE_KEY) || "";
      if (savedOwnerKey) {
        ownerKeyInputEl.value = savedOwnerKey;
      }

      ownerKeyInputEl.addEventListener("input", () => {
        const value = getOwnerKey();
        if (value) {
          localStorage.setItem(OWNER_BYPASS_STORAGE_KEY, value);
        } else {
          localStorage.removeItem(OWNER_BYPASS_STORAGE_KEY);
        }
        refreshRunButtonVisibility();
      });
    }
    // TEST_ONLY_OWNER_BYPASS_END
    window.addEventListener("resize", applyChecklistMaxHeight);
    renderChecks();
    mergePresetIntoTextarea();
    refreshRunButtonVisibility();

    const turnstileInitTimer = setInterval(() => {
      tryRenderTurnstile();
      if (turnstileWidgetId !== null || !TURNSTILE_SITE_KEY || TURNSTILE_SITE_KEY.startsWith("YOUR_")) {
        clearInterval(turnstileInitTimer);
      }
    }, 200);
  </script>
  <script
    src="../../assets/visitor-counter.js"
    defer
    data-visitor-counter
    data-namespace="devbyhwang-tel-aviv"
    data-total-key="total"
    data-daily-prefix="daily"
    data-timezone="Asia/Seoul"
  ></script>
  <div
    data-visitor-counter
    data-namespace="devbyhwang-tel-aviv-playground"
    data-total-key="total"
    data-daily-prefix="daily"
    data-timezone="Asia/Seoul"
    data-today-id=""
    data-total-id=""
    hidden
  ></div>
</body>
