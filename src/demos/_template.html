<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Title | DevByHwang</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #fff;
      /* Game-like demos may keep this; document demos should allow scroll. */
      overflow: hidden;
    }
    #demo-container {
      width: 100%;
      height: calc(100vh - var(--playground-ad-safe-space, 0px));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      z-index: 999;
      transition: background 0.2s;
    }
    .back-link:hover {
      background: rgba(0, 0, 0, 0.9);
    }

    @media (max-width: 768px) {
      .back-link {
        top: 12px;
        left: 12px;
        padding: 8px 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <a href="../" class="back-link">← Playground</a>

  <div id="demo-container" data-playground-safe-root>
    <h1>Your Demo Here</h1>
    <!-- Add your interactive demo code here -->
  </div>

  <script>
    // Your JavaScript
    console.log('Demo initialized');
  </script>
  <!-- Playground 하단 광고는 공통 스크립트가 CSS까지 자동 로드합니다. -->
  <script src="../../../assets/playground-bottom-ad.js" defer></script>
</body>
</html>
