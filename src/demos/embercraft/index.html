<!DOCTYPE html>
<html lang="ko" style="overflow: hidden; height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://pagead2.googlesyndication.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.counterapi.dev; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; object-src 'none'; base-uri 'self'"
    >
    <title>Embercraft v149: The Living Hearth</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto+Mono:wght@400;700&display=swap');
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden !important; position: fixed; background: #020203; color: #b5a494; font-family: 'Roboto Mono', monospace; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 1; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: grid; grid-template-columns: 320px 1fr 340px; padding: 25px; gap: 20px; z-index: 10; transition: opacity 0.4s; }
        .ui-layer.hidden { opacity: 0; pointer-events: none; }

        .panel { background: rgba(10, 8, 7, 0.92); border: 1px solid rgba(212, 163, 115, 0.15); border-radius: 3px; padding: 22px; pointer-events: auto; display: flex; flex-direction: column; max-height: calc(100vh - 50px); backdrop-filter: blur(30px); }
        h2 { margin-bottom: 15px; font-family: 'Cinzel', serif; font-size: 1.1rem; color: #d4a373; text-align: center; border-bottom: 2px solid #2a1a0f; padding-bottom: 12px; letter-spacing: 4px; }

        .scroll-container { flex: 1; overflow-y: auto; }
        .scroll-container::-webkit-scrollbar { width: 3px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #2a1a0f; }

        .inv-btn { background: rgba(212, 163, 115, 0.03); padding: 18px; margin-bottom: 8px; border: 1px solid #2a1a0f; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .inv-btn:hover { background: rgba(212, 163, 115, 0.1); border-color: #d4a373; }

        .monitor { text-align: center; margin-bottom: 15px; background: #050403; padding: 18px; border: 1px solid #2a1a0f; border-radius: 4px; }
        .temp-val { font-size: 2.4rem; color: #d4a373; font-weight: bold; font-family: 'Cinzel', serif; }

        .log-list { flex: 1; overflow-y: auto; background: #020101; padding: 10px; border: 1px solid #1a0b05; }
        .log-item { padding: 10px; margin-bottom: 8px; background: #080605; font-size: 0.7rem; border-left: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .log-item.burn { border-left-color: #d4a373; background: rgba(212, 163, 115, 0.05); }

        .remove-btn { background: rgba(255, 50, 0, 0.05); border: 1px solid #331105; color: #aa4444; padding: 4px 8px; cursor: pointer; font-size: 0.6rem; transition: 0.1s; }
        .remove-btn:hover { background: #883333; color: #fff; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn { padding: 16px; background: #120c08; border: 1px solid #2a1a0f; color: #8e7e72; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; font-size: 0.85rem; }

        /* 볼륨 슬라이더 스타일 */
        #audio-panel { position: absolute; bottom: 25px; right: 25px; pointer-events: auto; display: flex; align-items: center; gap: 10px; opacity: 0.2; transition: 0.3s; z-index: 100; }
        #audio-panel:hover { opacity: 0.7; }
        #vol-slider { cursor: pointer; width: 80px; accent-color: #d4a373; }
        #audio-panel span { font-size: 0.6rem; color: #d4a373; letter-spacing: 1px; }

        #ui-toggle { position: absolute; top: 25px; right: 25px; width: 45px; height: 45px; background: rgba(10, 8, 7, 0.8); border: 1px solid rgba(212, 163, 115, 0.2); color: #d4a373; font-family: 'Cinzel', serif; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: #020203; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #overlay h1 { color: #d4a373; font-family: 'Cinzel', serif; font-size: 3.5rem; letter-spacing: 20px; }
        .mobile-panel-tabs { display: none; }

        /* Back link styling */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            z-index: 1000;
            transition: background 0.2s;
        }
        .back-link:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        @media (max-width: 1024px) {
            .ui-layer {
                grid-template-columns: minmax(240px, 320px) 1fr;
                gap: 12px;
                padding: 12px;
            }

            .panel {
                max-height: calc(100vh - 24px);
                padding: 14px;
            }

            .back-link {
                top: 10px;
                left: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }

            #ui-toggle {
                top: 10px;
                right: 10px;
                width: 44px;
                height: 44px;
            }

            #audio-panel {
                right: 10px;
                bottom: 10px;
                opacity: 0.55;
                background: rgba(10, 8, 7, 0.82);
                border: 1px solid rgba(212, 163, 115, 0.25);
                border-radius: 6px;
                padding: 8px 10px;
            }

            #overlay h1 {
                font-size: clamp(1.5rem, 8vw, 2.1rem);
                letter-spacing: 6px;
                text-align: center;
            }
        }

        @media (max-width: 768px) {
            .ui-layer {
                display: block;
                padding: 10px;
            }

            .mobile-panel-tabs {
                display: inline-flex;
                position: absolute;
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                gap: 6px;
                pointer-events: auto;
                z-index: 20;
            }

            .mobile-panel-tabs button {
                min-height: 44px;
                border: 1px solid rgba(212, 163, 115, 0.35);
                border-radius: 999px;
                padding: 8px 12px;
                background: rgba(10, 8, 7, 0.88);
                color: #d4a373;
                font-size: 0.72rem;
                letter-spacing: 1px;
                cursor: pointer;
            }

            .mobile-panel-tabs button.active {
                background: rgba(212, 163, 115, 0.2);
                border-color: #d4a373;
            }

            .ui-layer .panel-spacer {
                display: none;
            }

            .ui-layer .panel {
                display: none;
                width: min(100%, 360px);
                max-height: min(70vh, 460px);
                margin-top: 58px;
                margin-left: 0;
                margin-right: auto;
            }

            .ui-layer.mobile-panel-inventory .panel-inventory,
            .ui-layer.mobile-panel-analysis .panel-analysis {
                display: flex;
            }

            #ui-toggle {
                top: auto;
                bottom: 10px;
                right: 10px;
            }

            #audio-panel {
                right: 64px;
                bottom: 10px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" integrity="sha384-CI3ELBVUz9XQO+97x6nwMDPosPR5XvsxW2ua7N1Xeygeh1IxtgqtCkGfQY9WWdHu" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" integrity="sha384-wagZhIFgY4hD+7awjQjR4e2E294y6J2HSnd8eTNc15ZubTeQeVRZwhQJ+W6hnBsf" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js" integrity="sha384-I+vlbhtggPtDgOcGQ3rwhQl9JEO7qonTByw9baD7Vlc+1bJdn2ucktJAsbo3nmGA" crossorigin="anonymous"></script>
</head>
<body>

<a href="../" class="back-link">← Playground</a>

<div id="overlay">
    <h1>EMBERCRAFT v149</h1>
    <p>THE LIVING HEARTH</p>
</div>

<button id="ui-toggle">H</button>

<div id="audio-panel">
    <span>SOUND</span>
    <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.3">
</div>

<div id="canvas-container"></div>

<div class="ui-layer mobile-panel-analysis" id="main-ui">
    <div class="mobile-panel-tabs" id="mobile-panel-tabs">
        <button type="button" data-panel="analysis" class="active">ANALYSIS</button>
        <button type="button" data-panel="inventory">SATCHEL</button>
    </div>
    <aside class="panel panel-inventory">
        <h2>SATCHEL</h2>
        <div class="scroll-container">
            <div class="inv-btn" data-log-type="twig"><div><b>Tinder</b> <small>Fast</small></div><span>+</span></div>
            <div class="inv-btn" data-log-type="wood"><div><b>Kindling</b> <small>Steady</small></div><span>+</span></div>
            <div class="inv-btn" data-log-type="log"><div><b>Oak Core</b> <small>Eternal</small></div><span>+</span></div>
        </div>
    </aside>
    <div class="panel-spacer"></div>
    <aside class="panel panel-analysis">
        <h2>ANALYSIS</h2>
        <div class="monitor">
            <div class="temp-val" id="ui-temp">15°C</div>
            <div style="color:#6d4c41; font-size:0.65rem; margin-top:5px; letter-spacing:2px;">DYNAMIC AUDIO & EMBERS</div>
        </div>
        <div class="log-list" id="log-list"></div>
        <div class="controls">
            <button class="btn" id="btn-fan">BELLOWS</button>
            <button class="btn" id="btn-ignite" style="color:#d4a373; border-color:#d4a373;">IGNITE</button>
        </div>
    </aside>
</div>
<script src="../../assets/embercraft.js" defer></script>
<script src="../../assets/playground-bottom-ad.js" defer></script>
<script
    src="../../assets/visitor-counter.js"
    defer
    data-visitor-counter
    data-namespace="devbyhwang-tel-aviv"
    data-total-key="total"
    data-daily-prefix="daily"
    data-timezone="Asia/Seoul"
></script>
<div
    data-visitor-counter
    data-namespace="devbyhwang-tel-aviv-playground"
    data-total-key="total"
    data-daily-prefix="daily"
    data-timezone="Asia/Seoul"
    data-today-id=""
    data-total-id=""
    hidden
></div>
</body>
</html>
