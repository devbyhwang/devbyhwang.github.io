<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://esm.run https://cdn.jsdelivr.net https://pagead2.googlesyndication.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' data: blob: https://esm.run https://cdn.jsdelivr.net https://huggingface.co https://*.huggingface.co https://cdn-lfs.huggingface.co https://cdn-lfs-us-1.hf.co https://cas-bridge.xethub.hf.co https://cas-server.xethub.hf.co https://raw.githubusercontent.com https://*.adtrafficquality.google; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://*.adtrafficquality.google https://www.google.com https://www.recaptcha.net; object-src 'none'; base-uri 'self'"
  >
  <title>Local LLM Chat | DevByHwang</title>
  <style>
    :root {
      --ink: #14231f;
      --muted: #64736d;
      --paper: #fff8eb;
      --forest: #173d35;
      --forest-2: #285f4f;
      --amber: #f1a64b;
      --rose: #d96a4a;
      --line: rgba(20, 35, 31, 0.14);
      --shadow: 0 24px 80px rgba(10, 28, 23, 0.18);
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: #10231f; }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "Trebuchet MS", Verdana, sans-serif;
      background:
        radial-gradient(circle at 10% 8%, rgba(241, 166, 75, 0.54), transparent 24rem),
        radial-gradient(circle at 88% 13%, rgba(185, 217, 190, 0.5), transparent 28rem),
        linear-gradient(135deg, #fff3dc 0%, #dfeacf 52%, #173d35 100%);
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.56; }

    .back-link {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 15px;
      border: 1px solid rgba(255, 248, 235, 0.45);
      border-radius: 999px;
      color: var(--paper);
      text-decoration: none;
      background: rgba(20, 35, 31, 0.78);
      backdrop-filter: blur(18px);
    }

    .shell {
      width: min(1040px, 100%);
      min-height: calc(100vh - var(--playground-ad-safe-space, 0px));
      margin: 0 auto;
      padding: 78px 16px max(30px, calc(var(--playground-ad-safe-space, 0px) + 24px));
    }

    .hero {
      display: grid;
      gap: 10px;
      margin: 0 0 16px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      justify-self: center;
      padding: 7px 12px;
      border: 1px solid rgba(20, 35, 31, 0.16);
      border-radius: 999px;
      color: var(--forest);
      background: rgba(255, 248, 235, 0.76);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      font-size: clamp(3rem, 8vw, 6.4rem);
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .chat-panel, .advanced-panel {
      border: 1px solid rgba(255, 248, 235, 0.46);
      border-radius: 30px;
      background: rgba(255, 248, 235, 0.82);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .chat-panel {
      display: grid;
      grid-template-rows: auto minmax(430px, 1fr) auto;
      min-height: min(740px, calc(100vh - 210px));
      overflow: hidden;
    }

    .chat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.28);
    }

    .chat-title { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .chat-title h2 {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      font-size: 1.65rem;
      letter-spacing: -0.04em;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      border-radius: 999px;
      color: var(--forest);
      background: rgba(23, 61, 53, 0.1);
      font-size: 0.82rem;
      font-weight: 900;
      white-space: nowrap;
    }
    .status-chip::before {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--amber);
      content: "";
    }

    .runtime { display: none; }

    .button-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      color: var(--paper);
      background: var(--forest);
      font-weight: 900;
    }
    .button.secondary { color: var(--forest); background: rgba(20, 35, 31, 0.08); }
    .button.warn { color: #26170a; background: var(--amber); }
    .button.danger { background: var(--rose); }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
      padding: 18px;
    }

    .message {
      max-width: min(760px, 92%);
      padding: 13px 15px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.68);
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      color: var(--paper);
      background: var(--forest);
    }

    .message.assistant { align-self: flex-start; }
    .message.system {
      align-self: center;
      max-width: 100%;
      color: var(--muted);
      background: rgba(20, 35, 31, 0.06);
      font-size: 0.92rem;
      text-align: center;
    }

    .composer {
      display: grid;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.34);
    }

    textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.78);
      outline: none;
    }
    textarea { min-height: 96px; resize: vertical; padding: 13px; line-height: 1.5; }
    select { min-height: 42px; padding: 0 12px; }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .hint { margin: 0; color: var(--muted); font-size: 0.9rem; line-height: 1.45; }
    .hidden { display: none; }

    .progress-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(20, 35, 31, 0.12);
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--forest-2), var(--amber));
      transition: width 180ms ease;
    }

    .advanced-panel {
      margin-top: 12px;
      padding: 0;
      overflow: hidden;
    }
    .advanced-panel summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      color: var(--forest);
      font-weight: 900;
      cursor: pointer;
      list-style: none;
    }
    .advanced-panel summary::-webkit-details-marker { display: none; }
    .advanced-panel summary::after { content: "+"; font-size: 1.2rem; }
    .advanced-panel[open] summary::after { content: "-"; }

    .advanced-content {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 0 16px 16px;
      border-top: 1px solid var(--line);
    }

    .field, .status-box {
      display: grid;
      gap: 7px;
      padding-top: 14px;
    }
    label, .status-label {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .advanced-actions { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    dialog {
      width: min(480px, calc(100vw - 28px));
      border: 0;
      border-radius: 28px;
      color: var(--ink);
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    dialog::backdrop { background: rgba(8, 20, 17, 0.55); backdrop-filter: blur(6px); }
    .modal-body { display: grid; gap: 14px; margin: 0; padding: 24px; }
    .modal-body h2 { margin: 0; font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif; }
    .modal-body p, .modal-body li { color: var(--muted); line-height: 1.55; }
    .modal-body ul { margin: 0; padding-left: 18px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

    @media (max-width: 700px) {
      .shell { padding-inline: 12px; padding-top: 18px; }
      .back-link { position: static; margin-bottom: 16px; }
      .chat-head, .composer-actions { flex-direction: column; align-items: stretch; }
      .chat-title { justify-content: space-between; }
      .message { max-width: 100%; }
      .advanced-content { grid-template-columns: 1fr; }
      h1 { font-size: clamp(2.7rem, 16vw, 4.4rem); }
    }
  </style>
</head>
<body data-playground-safe-root>
  <a class="back-link" href="/devbyhwang/playground/">← Playground</a>
  <main class="shell">
    <section class="hero" aria-label="소개">
      <span class="eyebrow">Local AI</span>
      <h1>Local LLM Chat</h1>
    </section>

    <section class="chat-panel" aria-label="로컬 LLM 채팅">
      <header class="chat-head">
        <div class="chat-title">
          <h2>Chat</h2>
          <span class="status-chip" id="readinessPill">확인 중</span>
        </div>
        <div class="button-row">
          <button class="button warn" id="loadBtn" type="button" disabled>시작</button>
          <button class="button secondary" id="clearBtn" type="button">지우기</button>
        </div>
      </header>

      <div class="messages" id="messages" aria-live="polite"></div>

      <form class="composer" id="chatForm">
        <textarea id="promptInput" placeholder="시작 후 메시지를 입력하세요" disabled></textarea>
        <div class="composer-actions">
          <p class="hint hidden" id="composerHint">모델 준비 전입니다.</p>
          <div class="button-row">
            <button class="button secondary" id="stopBtn" type="button" disabled>중지</button>
            <button class="button warn" id="sendBtn" type="submit" disabled>보내기</button>
          </div>
        </div>
        <div class="progress-track" aria-label="모델 로드 진행률"><div class="progress-bar" id="progressBar"></div></div>
        <p class="hint hidden" id="loadStatus">사용 가능한지 확인하고 있습니다.</p>
      </form>
    </section>

    <details class="advanced-panel">
      <summary>설정</summary>
      <div class="advanced-content">
        <div class="field">
          <label for="modelSelect">모델</label>
          <select id="modelSelect"></select>
        </div>
        <div class="advanced-actions">
          <button class="button secondary" id="cacheBtn" type="button">모델 캐시 삭제</button>
        </div>
        <span class="hidden" id="runtimeStats">idle</span>
        <span class="hidden" id="gpuStatus">확인 중</span>
        <span class="hidden" id="recommendStatus">확인 중</span>
        <span class="hidden" id="storageStatus">확인 중</span>
      </div>
    </details>
  </main>

  <dialog id="downloadDialog">
    <form method="dialog" class="modal-body">
      <span class="eyebrow">Download</span>
      <h2>모델 다운로드</h2>
      <p id="dialogSummary">브라우저에 모델을 저장하고 이 기기에서 실행합니다.</p>
      <label style="display:flex; grid-template-columns:auto 1fr; align-items:center; gap:10px; text-transform:none; letter-spacing:0; font-weight:700;">
        <input id="rememberConsentInput" type="checkbox" checked>
        <span>다음부터 자동 시작</span>
      </label>
      <div class="modal-actions">
        <button class="button secondary" value="cancel" type="submit">취소</button>
        <button class="button warn" value="confirm" type="submit">받고 시작</button>
      </div>
    </form>
  </dialog>

  <dialog id="cacheDialog">
    <form method="dialog" class="modal-body">
      <span class="eyebrow">Cache</span>
      <h2>모델 캐시를 삭제할까요?</h2>
      <p>다운로드한 모델과 자동 시작 설정을 지웁니다.</p>
      <div class="modal-actions">
        <button class="button secondary" value="cancel" type="submit">취소</button>
        <button class="button danger" value="confirm" type="submit">삭제</button>
      </div>
    </form>
  </dialog>

  <script type="module">
    import {
      CreateWebWorkerMLCEngine,
      deleteModelAllInfoInCache,
    } from "https://esm.run/@mlc-ai/web-llm@0.2.83";

    const MOCK_LLM_MODE = location.hostname === "localhost" && new URLSearchParams(location.search).has("mockLlm");
    const MODELS = {
      "Qwen3.5-0.8B-q4f32_1-MLC": { tier: "저사양", label: "저사양", detail: "Qwen3.5 0.8B", downloadMB: 900, vramMB: 1895, minStorageBufferMB: 128 },
      "Qwen3.5-2B-q4f32_1-MLC": { tier: "표준", label: "표준", detail: "Qwen3.5 2B", downloadMB: 1500, vramMB: 2592, minStorageBufferMB: 256 },
      "Qwen3.5-4B-q4f16_1-MLC": { tier: "고성능", label: "고성능", detail: "Qwen3.5 4B", downloadMB: 2400, vramMB: 3868, minStorageBufferMB: 512 },
      "Qwen3.5-9B-q4f16_1-MLC": { tier: "최고성능", label: "최고성능", detail: "Qwen3.5 9B", downloadMB: 5200, vramMB: 6433, minStorageBufferMB: 1024 },
    };
    const DEFAULT_MODEL_ID = "Qwen3.5-2B-q4f32_1-MLC";
    const LOWEST_MODEL_ID = "Qwen3.5-0.8B-q4f32_1-MLC";
    const MODEL_IDS_BY_SIZE = Object.keys(MODELS).sort((a, b) => MODELS[b].vramMB - MODELS[a].vramMB);
    const MB = 1024 * 1024;

    const state = {
      engine: null,
      worker: null,
      loadedModel: null,
      loading: false,
      generating: false,
      diagnostics: null,
      messages: [],
      selectedModel: DEFAULT_MODEL_ID,
    };

    const $ = (selector) => document.querySelector(selector);
    const elements = {
      readinessPill: $("#readinessPill"), modelSelect: $("#modelSelect"), gpuStatus: $("#gpuStatus"), recommendStatus: $("#recommendStatus"), storageStatus: $("#storageStatus"), progressBar: $("#progressBar"), loadStatus: $("#loadStatus"), loadBtn: $("#loadBtn"), cacheBtn: $("#cacheBtn"), runtimeStats: $("#runtimeStats"), messages: $("#messages"), chatForm: $("#chatForm"), promptInput: $("#promptInput"), composerHint: $("#composerHint"), sendBtn: $("#sendBtn"), stopBtn: $("#stopBtn"), clearBtn: $("#clearBtn"), downloadDialog: $("#downloadDialog"), dialogSummary: $("#dialogSummary"), rememberConsentInput: $("#rememberConsentInput"), cacheDialog: $("#cacheDialog"),
    };

    const consentKey = (modelId) => `local-llm-consent:${modelId}`;
    const clamp = (value, min = 0, max = 1) => Math.max(min, Math.min(max, value));
    const bytesToMB = (value) => Number.isFinite(value) ? value / MB : 0;
    const formatGB = (bytes) => bytes ? `${(bytes / 1024 / 1024 / 1024).toFixed(1)}GB` : "확인 불가";
    const setProgress = (ratio) => { elements.progressBar.style.width = `${Math.round(clamp(ratio) * 100)}%`; };
    const setLoadStatus = (text) => { elements.loadStatus.textContent = text; };

    const renderModelOptions = () => {
      elements.modelSelect.innerHTML = Object.entries(MODELS).map(([id, model]) => (
        `<option value="${id}">${model.label}</option>`
      )).join("");
    };

    const supportsWebLLMRuntime = (limits) => {
      if (!limits) return false;
      return bytesToMB(limits.maxBufferSize) >= 256
        && bytesToMB(limits.maxStorageBufferBindingSize) >= 128
        && limits.maxComputeWorkgroupStorageSize >= 32768
        && limits.maxStorageBuffersPerShaderStage >= 10;
    };

    const modelFitsAdapter = (model, limits) => {
      if (!limits) return false;
      return bytesToMB(limits.maxBufferSize) >= model.vramMB
        && bytesToMB(limits.maxStorageBufferBindingSize) >= model.minStorageBufferMB;
    };

    const pickModelForDevice = ({ webgpu, adapterLimits }) => {
      if (!webgpu) return DEFAULT_MODEL_ID;
      if (MOCK_LLM_MODE) return "Qwen3.5-2B-q4f32_1-MLC";
      return MODEL_IDS_BY_SIZE.find((modelId) => modelFitsAdapter(MODELS[modelId], adapterLimits)) || LOWEST_MODEL_ID;
    };

    const applySelectedModel = (modelId) => {
      state.selectedModel = MODELS[modelId] ? modelId : DEFAULT_MODEL_ID;
      elements.modelSelect.value = state.selectedModel;
    };

    const addMessage = (role, text) => {
      const node = document.createElement("article");
      node.className = `message ${role}`;
      node.textContent = text;
      elements.messages.append(node);
      elements.messages.scrollTop = elements.messages.scrollHeight;
      return node;
    };

    const clearConversation = () => {
      if (state.generating) return;
      state.messages = [];
      elements.messages.innerHTML = "";
    };

    const renderControls = () => {
      const ready = Boolean(state.engine && state.loadedModel && !state.loading);
      elements.loadBtn.disabled = state.loading || (!MOCK_LLM_MODE && state.diagnostics && !state.diagnostics.webgpu);
      elements.loadBtn.textContent = state.loading ? "준비 중" : ready ? "준비됨" : "시작";
      elements.modelSelect.disabled = state.loading || state.generating;
      elements.clearBtn.disabled = state.generating;
      elements.promptInput.disabled = !ready || state.generating;
      elements.sendBtn.disabled = !ready || state.generating;
      elements.stopBtn.disabled = !state.generating;
      elements.promptInput.placeholder = ready ? "메시지를 입력하세요" : "시작 후 메시지를 입력하세요";
      elements.composerHint.textContent = ready ? "준비되었습니다." : state.loading ? "모델을 준비하고 있습니다." : "시작 버튼을 누르세요.";
      elements.runtimeStats.textContent = state.generating ? "응답 생성 중" : ready ? "준비됨" : "대기 중";
    };

    const diagnose = async () => {
      let adapter = null;
      let adapterInfo = null;
      if (!MOCK_LLM_MODE && navigator.gpu) {
        try {
          adapter = await navigator.gpu.requestAdapter({ powerPreference: "high-performance" });
          adapterInfo = adapter?.info || null;
          if (!adapterInfo && typeof adapter?.requestAdapterInfo === "function") {
            try {
              adapterInfo = await adapter.requestAdapterInfo();
            } catch (_) {
              adapterInfo = null;
            }
          }
        } catch (_) {
          adapter = null;
          adapterInfo = null;
        }
      }

      const adapterLimits = adapter?.limits || null;
      const webgpu = MOCK_LLM_MODE || supportsWebLLMRuntime(adapterLimits);
      const gpuLabel = [adapterInfo?.vendor, adapterInfo?.architecture].filter(Boolean).join(" · ");
      state.diagnostics = { webgpu, adapterLimits, gpuLabel };
      elements.gpuStatus.textContent = webgpu ? (MOCK_LLM_MODE ? "테스트 모드" : gpuLabel || "사용 가능") : "지원 안 됨";
      const recommendedModelId = pickModelForDevice({ webgpu, adapterLimits });
      applySelectedModel(recommendedModelId);
      elements.storageStatus.textContent = adapterLimits?.maxBufferSize ? `GPU 버퍼 ${formatGB(adapterLimits.maxBufferSize)}` : "확인 불가";
      elements.recommendStatus.textContent = webgpu ? MODELS[recommendedModelId].label : "다른 브라우저 필요";
      elements.readinessPill.textContent = webgpu ? "시작 가능" : "지원 안 됨";
      setLoadStatus(webgpu ? "시작할 수 있습니다." : "이 브라우저는 필요한 기능을 지원하지 않습니다.");
      renderControls();
    };

    const createMockEngine = () => ({
      chat: {
        completions: {
          create: async function* ({ messages }) {
            const last = messages.filter((message) => message.role === "user").at(-1)?.content || "";
            const userQuestion = last.replace(/\s+/g, " ").trim();
            const text = `테스트 응답입니다. "${userQuestion.slice(0, 60)}"라고 이해했습니다. 실제 브라우저에서는 로컬 모델이 이 자리에서 답합니다.`;
            for (let index = 0; index < text.length; index += 18) {
              await new Promise((resolve) => setTimeout(resolve, 8));
              yield { choices: [{ delta: { content: text.slice(index, index + 18) } }] };
            }
          },
        },
      },
    });

    const confirmDownload = async (modelId) => {
      if (MOCK_LLM_MODE || localStorage.getItem(consentKey(modelId)) === "yes") return true;
      const model = MODELS[modelId];
      elements.dialogSummary.textContent = `${model.label} 모델을 브라우저에 저장합니다.`;
      elements.downloadDialog.showModal();
      const result = await new Promise((resolve) => {
        elements.downloadDialog.addEventListener("close", () => resolve(elements.downloadDialog.returnValue), { once: true });
      });
      if (result === "confirm" && elements.rememberConsentInput.checked) localStorage.setItem(consentKey(modelId), "yes");
      return result === "confirm";
    };

    const unloadEngine = () => {
      try { state.engine?.unload?.(); } catch (_) {}
      if (state.worker) state.worker.terminate();
      state.engine = null;
      state.worker = null;
      state.loadedModel = null;
    };

    const loadModel = async () => {
      const modelId = state.selectedModel;
      if (state.loading) return;
      if (!MOCK_LLM_MODE && state.diagnostics && !state.diagnostics.webgpu) return;
      const ok = await confirmDownload(modelId);
      if (!ok) return;

      state.loading = true;
      elements.readinessPill.textContent = "준비 중";
      setProgress(0.03);
      setLoadStatus("모델을 준비하고 있습니다.");
      renderControls();

      try {
        unloadEngine();
        if (MOCK_LLM_MODE) {
          state.engine = createMockEngine();
          state.loadedModel = `mock:${modelId}`;
          setProgress(1);
          setLoadStatus("준비되었습니다.");
        } else {
          state.worker = new Worker("./worker.js", { type: "module" });
          state.engine = await CreateWebWorkerMLCEngine(state.worker, modelId, {
            initProgressCallback: (progress) => {
              const ratio = progress.progress || 0;
              setProgress(ratio);
              setLoadStatus(progress.text || `준비 중 ${Math.round(ratio * 100)}%`);
            },
          });
          state.loadedModel = modelId;
          setProgress(1);
          setLoadStatus("준비되었습니다.");
        }
        elements.readinessPill.textContent = "준비됨";
        elements.promptInput.focus();
      } catch (error) {
        console.error(error);
        unloadEngine();
        elements.readinessPill.textContent = "실패";
        setLoadStatus("준비에 실패했습니다. 설정에서 더 낮은 모델을 선택해 보세요.");
        addMessage("system", "모델 준비에 실패했습니다. 설정에서 더 낮은 모델을 선택하거나 브라우저를 바꿔 보세요.");
      } finally {
        state.loading = false;
        renderControls();
      }
    };

    const sendPrompt = async (userText) => {
      const text = userText.trim();
      if (!text || !state.engine || state.generating) return;

      const requestMessages = [...state.messages, { role: "user", content: text }];
      addMessage("user", text);
      state.messages.push({ role: "user", content: text });
      const assistantNode = addMessage("assistant", "");
      state.generating = true;
      renderControls();

      let reply = "";
      const started = performance.now();
      try {
        const chunks = await state.engine.chat.completions.create({
          messages: requestMessages,
          stream: true,
        });
        for await (const chunk of chunks) {
          const delta = chunk?.choices?.[0]?.delta?.content || "";
          if (!delta) continue;
          reply += delta;
          assistantNode.textContent = reply || "생성 중...";
          elements.messages.scrollTop = elements.messages.scrollHeight;
        }
        assistantNode.textContent = reply;
        state.messages.push({ role: "assistant", content: reply });
        elements.runtimeStats.textContent = `${((performance.now() - started) / 1000).toFixed(1)}s`;
      } catch (error) {
        console.error(error);
        assistantNode.textContent = "응답 생성에 실패했습니다. 다시 시작해 주세요.";
      } finally {
        state.generating = false;
        renderControls();
      }
    };

    const stopGeneration = () => {
      try { state.engine?.interruptGenerate?.(); } catch (_) {}
      state.generating = false;
      renderControls();
    };

    const clearModelCache = async () => {
      elements.cacheDialog.showModal();
      const result = await new Promise((resolve) => {
        elements.cacheDialog.addEventListener("close", () => resolve(elements.cacheDialog.returnValue), { once: true });
      });
      if (result !== "confirm") return;
      unloadEngine();
      for (const modelId of Object.keys(MODELS)) {
        localStorage.removeItem(consentKey(modelId));
        try { await deleteModelAllInfoInCache(modelId); } catch (error) { console.warn(error); }
      }
      setProgress(0);
      setLoadStatus("모델 캐시를 삭제했습니다.");
      addMessage("system", "모델 캐시를 삭제했습니다. 다시 시작할 수 있습니다.");
      renderControls();
    };

    elements.loadBtn.addEventListener("click", loadModel);
    elements.cacheBtn.addEventListener("click", clearModelCache);
    elements.stopBtn.addEventListener("click", stopGeneration);
    elements.clearBtn.addEventListener("click", clearConversation);
    elements.chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = elements.promptInput.value;
      elements.promptInput.value = "";
      sendPrompt(text);
    });
    elements.promptInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        elements.chatForm.requestSubmit();
      }
    });
    elements.modelSelect.addEventListener("change", () => {
      applySelectedModel(elements.modelSelect.value);
      if (state.loadedModel) {
        unloadEngine();
        setProgress(0);
        setLoadStatus("모델을 바꿨습니다. 다시 시작하세요.");
        addMessage("system", "모델 선택이 바뀌었습니다. 다시 시작해야 합니다.");
        renderControls();
      }
    });

    renderModelOptions();
    applySelectedModel(DEFAULT_MODEL_ID);
    await diagnose();
    const initialModel = state.selectedModel;
    if (!MOCK_LLM_MODE && localStorage.getItem(consentKey(initialModel)) === "yes" && state.diagnostics?.webgpu) {
      loadModel();
    }
  </script>
  <script src="../../../assets/playground-bottom-ad.js" defer></script>
</body>
</html>
