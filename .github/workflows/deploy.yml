name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Set PATH_PREFIX
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "PATH_PREFIX=/" >> "$GITHUB_ENV"
          else
            echo "PATH_PREFIX=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi
      - name: Set SITE_URL
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "SITE_URL=https://$REPO_NAME" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://$OWNER.github.io" >> "$GITHUB_ENV"
          fi
      - name: Validate AdSense config
        env:
          GOOGLE_ADS_CLIENT: ca-pub-8933203312924164
          GOOGLE_ADS_ENABLE: "true"
          GOOGLE_ADS_SLOT_DEFAULT: ${{ vars.GOOGLE_ADS_SLOT_DEFAULT }}
          GOOGLE_ADS_PLAYGROUND_BOTTOM_SLOT: ${{ vars.GOOGLE_ADS_PLAYGROUND_BOTTOM_SLOT }}
        run: |
          missing=()
          for name in GOOGLE_ADS_CLIENT GOOGLE_ADS_SLOT_DEFAULT GOOGLE_ADS_PLAYGROUND_BOTTOM_SLOT; do
            if [[ -z "${!name}" || "${!name}" == "0000000000" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required AdSense configuration: %s\n' "${missing[*]}" >&2
            printf 'Create AdSense ad units and set the corresponding GitHub repository variables before deploying.\n' >&2
            exit 1
          fi
      - name: Build
        env:
          GOOGLE_ADS_CLIENT: ca-pub-8933203312924164
          GOOGLE_ADS_ENABLE: "true"
          GOOGLE_ADS_SLOT_DEFAULT: ${{ vars.GOOGLE_ADS_SLOT_DEFAULT }}
          GOOGLE_ADS_PLAYGROUND_BOTTOM_SLOT: ${{ vars.GOOGLE_ADS_PLAYGROUND_BOTTOM_SLOT }}
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
